openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Intent Engine API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leads
    description: Lead fetching, scoring, and management
  - name: stats
    description: Dashboard statistics
  - name: keywords
    description: Intent keyword configuration

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /leads:
    get:
      operationId: getLeads
      tags: [leads]
      summary: Fetch and score leads
      description: Fetch leads from all connectors, score them, and return filtered results
      parameters:
        - name: min_score
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: source
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: subreddit
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of scored leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadsResponse"

  /leads/refresh:
    post:
      operationId: refreshLeads
      tags: [leads]
      summary: Force-refresh leads
      description: Invalidates the lead cache and triggers a fresh fetch from all connectors
      responses:
        "200":
          description: Refreshed leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadsResponse"

  /leads/stats:
    get:
      operationId: getLeadsStats
      tags: [stats]
      summary: Get lead statistics
      description: Summary statistics for the intent engine dashboard
      responses:
        "200":
          description: Lead statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadsStats"

  /leads/saved:
    get:
      operationId: getSavedLeads
      tags: [leads]
      summary: Get saved leads
      description: Returns leads that have been saved/bookmarked
      responses:
        "200":
          description: Saved leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadsResponse"

  /leads/{id}/status:
    patch:
      operationId: updateLeadStatus
      tags: [leads]
      summary: Update lead status
      description: Update the outreach status of a saved lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadStatusInput"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLeadStatusResult"

  /leads/{id}/save:
    post:
      operationId: saveLead
      tags: [leads]
      summary: Save a lead
      description: Save or unsave a lead by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Save status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveLeadResult"

  /leads/{id}/respond:
    post:
      operationId: generateResponse
      tags: [leads]
      summary: Generate outreach response
      description: Generate an AI-style outreach message for a specific lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Generated response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedResponse"

  /leads/{id}/enrich:
    get:
      operationId: enrichLead
      tags: [leads]
      summary: Enrich a lead
      description: Extract contact info from post text and fetch the author's public platform profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Enrichment data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrichmentData"

  /sources:
    get:
      operationId: getSources
      tags: [leads]
      summary: Get available sources
      description: List all configured lead sources
      responses:
        "200":
          description: Available sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourcesResponse"

  /keywords:
    get:
      operationId: getKeywords
      tags: [keywords]
      summary: Get all intent keywords
      description: Returns all configured scoring keywords
      responses:
        "200":
          description: List of keywords
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeywordsResponse"
    post:
      operationId: createKeyword
      tags: [keywords]
      summary: Add a new keyword
      description: Add a new intent keyword with a score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKeywordInput"
      responses:
        "201":
          description: Created keyword
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Keyword"

  /keywords/reset:
    post:
      operationId: resetKeywords
      tags: [keywords]
      summary: Reset to defaults
      description: Reset all keywords to the default bank
      responses:
        "200":
          description: Keywords reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeywordsResponse"

  /keywords/test:
    post:
      operationId: testPhrase
      tags: [keywords]
      summary: Test a phrase against keywords
      description: Run a phrase through the scorer and return which keyword matched and the resulting score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestPhraseInput"
      responses:
        "200":
          description: Scoring result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPhraseResult"

  /keywords/{id}:
    patch:
      operationId: updateKeyword
      tags: [keywords]
      summary: Update a keyword
      description: Update a keyword's phrase, score, or enabled state
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateKeywordInput"
      responses:
        "200":
          description: Updated keyword
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Keyword"
    delete:
      operationId: deleteKeyword
      tags: [keywords]
      summary: Delete a keyword
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteKeywordResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Lead:
      type: object
      properties:
        id:
          type: string
        source:
          type: string
        text:
          type: string
        url:
          type: string
          nullable: true
        contact:
          type: string
          nullable: true
        intent_score:
          type: integer
        intent_label:
          type: string
        subreddit:
          type: string
          nullable: true
        author:
          type: string
          nullable: true
        created_at:
          type: string
        saved:
          type: boolean
        status:
          type: string
          nullable: true
      required:
        - id
        - source
        - text
        - intent_score
        - intent_label
        - created_at
        - saved

    LeadsResponse:
      type: object
      properties:
        leads:
          type: array
          items:
            $ref: "#/components/schemas/Lead"
        total:
          type: integer
        fetched_at:
          type: string
      required:
        - leads
        - total
        - fetched_at

    LeadsStats:
      type: object
      properties:
        total_leads:
          type: integer
        high_intent:
          type: integer
        medium_intent:
          type: integer
        low_intent:
          type: integer
        saved_count:
          type: integer
        by_source:
          type: array
          items:
            $ref: "#/components/schemas/SourceCount"
        avg_score:
          type: number
        last_run:
          type: string
          nullable: true
      required:
        - total_leads
        - high_intent
        - medium_intent
        - low_intent
        - saved_count
        - by_source
        - avg_score

    SourceCount:
      type: object
      properties:
        source:
          type: string
        count:
          type: integer
      required:
        - source
        - count

    ReplyVariant:
      type: object
      properties:
        label:
          type: string
        message:
          type: string
        style:
          type: string
      required:
        - label
        - message
        - style

    GeneratedResponse:
      type: object
      properties:
        message:
          type: string
        lead_id:
          type: string
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ReplyVariant"
      required:
        - message
        - lead_id
        - variants

    UpdateLeadStatusInput:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    UpdateLeadStatusResult:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
      required:
        - id
        - status

    SaveLeadResult:
      type: object
      properties:
        saved:
          type: boolean
        lead_id:
          type: string
      required:
        - saved
        - lead_id

    SourceInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        active:
          type: boolean
        description:
          type: string
        count:
          type: integer
      required:
        - id
        - name
        - active
        - description
        - count

    SourcesResponse:
      type: object
      properties:
        sources:
          type: array
          items:
            $ref: "#/components/schemas/SourceInfo"
      required:
        - sources

    Keyword:
      type: object
      properties:
        id:
          type: string
        phrase:
          type: string
        score:
          type: integer
        category:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
      required:
        - id
        - phrase
        - score
        - category
        - enabled
        - created_at

    KeywordsResponse:
      type: object
      properties:
        keywords:
          type: array
          items:
            $ref: "#/components/schemas/Keyword"
        total:
          type: integer
      required:
        - keywords
        - total

    CreateKeywordInput:
      type: object
      properties:
        phrase:
          type: string
        score:
          type: integer
        category:
          type: string
      required:
        - phrase
        - score

    UpdateKeywordInput:
      type: object
      properties:
        phrase:
          type: string
        score:
          type: integer
        category:
          type: string
        enabled:
          type: boolean

    TestPhraseInput:
      type: object
      properties:
        phrase:
          type: string
      required:
        - phrase

    TestPhraseResult:
      type: object
      properties:
        phrase:
          type: string
        score:
          type: integer
        intent_label:
          type: string
        matched_keyword:
          type: string
          nullable: true
        matched_keyword_id:
          type: string
          nullable: true
        all_matches:
          type: array
          items:
            $ref: "#/components/schemas/KeywordMatch"
      required:
        - phrase
        - score
        - intent_label

    KeywordMatch:
      type: object
      properties:
        id:
          type: string
        phrase:
          type: string
        score:
          type: integer
      required:
        - id
        - phrase
        - score

    DeleteKeywordResult:
      type: object
      properties:
        deleted:
          type: boolean
        id:
          type: string
      required:
        - deleted
        - id

    SourceProfile:
      type: object
      properties:
        karma:
          type: integer
          nullable: true
        account_age_days:
          type: integer
          nullable: true
        bio:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        profile_url:
          type: string
          nullable: true
      required:
        - karma
        - account_age_days
        - bio
        - website
        - profile_url

    EnrichmentData:
      type: object
      properties:
        lead_id:
          type: string
        emails:
          type: array
          items:
            type: string
        phones:
          type: array
          items:
            type: string
        urls:
          type: array
          items:
            type: string
        company:
          type: string
          nullable: true
        source_profile:
          $ref: "#/components/schemas/SourceProfile"
          nullable: true
      required:
        - lead_id
        - emails
        - phones
        - urls
        - company
        - source_profile
